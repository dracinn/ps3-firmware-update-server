images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: "aarch64"

cpus: 4
memory: "8GiB"
disk: "36GiB"

mounts:
  - location: "@@REPO_ROOT@@"
    mountPoint: "/workspace"
    writable: true

provision:
  - mode: system
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      export DEBIAN_FRONTEND=noninteractive
      apt-get update
      apt-get install -y --no-install-recommends \
        build-essential gcc-12 g++-12 cmake ninja-build texinfo \
        bison flex libgmp-dev libmpfr-dev libmpc-dev libisl-dev \
        zlib1g-dev libreadline-dev libncurses-dev libexpat1-dev \
        libssl-dev libelf-dev python3 python3-dev git wget patch \
        autoconf automake libtool zip unzip xz-utils file pkg-config \
        ca-certificates curl

  - mode: user
    script: |
      #!/usr/bin/env bash
      set -euxo pipefail
      if ! command -v rustc >/dev/null 2>&1; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
          | sh -s -- -y --default-toolchain stable
      fi

message: |
  PS3 helper build VM is ready.
  Run: ./ci/vm/build-ps3-helper-in-vm.sh 192.168.1.50
